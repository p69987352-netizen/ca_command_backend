# ===============================
# DATABASE CONFIGURATION (PostgreSQL)
# ===============================
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver

groq.api.key=${GROQ_API_KEY:}

# ===============================
# WHATSAPP META CONFIGURATION
# ===============================
whatsapp.access-token=${WA_ACCESS_TOKEN:}
whatsapp.phone-number-id=${WA_PHONE_ID:}
whatsapp.verify-token=${WA_VERIFY_TOKEN:}
whatsapp.app-secret=${WA_APP_SECRET:}

# ===============================
# JPA / HIBERNATE CONFIG
# ===============================
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Use update for production/dev
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:create}

payment.qr.url=https://i.postimg.cc/90hKBwSb/Whats-App-Image-2026-06-22-at-11-45-26-AM.jpg

aws.s3.bucket=${AWS_S3_BUCKET:caCommand1}
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
aws.s3.region=${AWS_REGION:}
aws.s3.endpoint=${AWS_S3_ENDPOINT:}

razorpay.api.key=${RAZORPAY_API_KEY:}
razorpay.api.secret=${RAZORPAY_API_SECRET:}

logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%X{traceId}] %m%n

